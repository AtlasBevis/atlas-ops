{{- if and .Values.rbac.enabled (or .Values.rbac.secretProvider.enabled .Values.rbac.configmapProvider.enabled) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "connect.clusterName" . }}-provider-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "connect.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources:
    {{- if .Values.rbac.secretProvider.enabled }}
    - secrets
    {{- end }}
    {{- if .Values.rbac.configmapProvider.enabled }}
    - configmaps
    {{- end }}
  verbs:
    - get
{{- end }}