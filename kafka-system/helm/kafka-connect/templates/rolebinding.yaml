{{- if and .Values.rbac.enabled (or .Values.rbac.secretProvider.enabled .Values.rbac.configmapProvider.enabled) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "connect.clusterName" . }}-provider-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "connect.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "connect.clusterName" . }}-connect
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "connect.clusterName" . }}-provider-role
{{- end }}