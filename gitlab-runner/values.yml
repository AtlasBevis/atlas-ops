## Document
## configuration reference: https://docs.gitlab.com/runner/configuration/advanced-configuration.html

## The GitLab Server URL (with protocol) that want to register the runner against
## ref: https://docs.gitlab.com/runner/commands/index.html#gitlab-runner-register
##
gitlabUrl: https://gitlab.com.vn/


## How many runner pods to launch.
##
replicas: 1

## Defines the maximum number of builds that can run concurrently
concurrent: 4

## Defines in seconds how often to check GitLab for new builds
## default: 3
checkInterval: 3

## Unregister all runners before termination
##
## Updating the runner's chart version or configuration will cause the runner container
## to be terminated and created again. This may cause your Gitlab instance to reference
## non-existant runners. Un-registering the runner before termination mitigates this issue.
## ref: https://docs.gitlab.com/runner/commands/index.html#gitlab-runner-unregister
##
## This property ensures that all the Runners present in the local config.toml are unregistered when the chart is uninstalled
## - If the token is prefixed with `glrt-` (meaning the runner was created in the UI or API),
##   the unregisterRunners property deletes the runner manager, not the runner.
##   The runner manager is identified by the runner and the machine that contains the config.toml.
unregisterRunner: true

## When stopping the runner, give it time to wait for its jobs to terminate.
##
## Updating the runner's chart version or configuration will cause the runner container
## to be terminated with a graceful stop request. terminationGracePeriodSeconds
## instructs Kubernetes to wait long enough for the runner pod to terminate gracefully.
## ref: https://docs.gitlab.com/runner/commands/#signals
terminationGracePeriodSeconds: 3600

## For RBAC support:
rbac:
  ## Specifies whether a Role and RoleBinding should be created
  ## If this value is set to `true`, `serviceAccount.create` should also be set to either `true` or `false`
  ##
  create: true

## Configure ServiceAccount
## ref: https://docs.gitlab.com/charts/charts/globals#service-accounts
serviceAccount:
  ## Specifies whether a ServiceAccount should be created
  ##
  ## Default: `false`
  create: true
  ## The name of the ServiceAccount to use.
  ## If not set and create is `true`, a name is generated using the `gitlab-runner.fullname`` template
  ##
  name: ""

runners:
  ## Set secret to an arbitrary value because the runner chart renders the gitlab-runner.secret template only if it is not empty.
  ## The parent/GitLab chart overrides the template to render the actual secret name.
  secret: gitlab-runner-secret

  ## Run the gitlab-bastion container with the ability to deploy/manage containers of jobs
  ## cluster-wide or only within namespace
  clusterWideAccess: false

  ## Defines the maximum number of builds that can run concurrently
  ## ref: https://docs.gitlab.com/runner/configuration/advanced-configuration.html#the-runners-section
  ## 
  request_concurrency: 8

  config: |
    [[runners]]
      name = "runner-32"
      maximum_timeout = 300
      run_untagged = true
      locked = false
      executor = "kubernetes"
      environment = ["FF_USE_ADAPTIVE_REQUEST_CONCURRENCY=1"]
      
      [runners.kubernetes]
        image = "alpine:3.23"
        image_pull_secrets = ["regcred"]
        pull_policy = ["if-not-present"]
        poll_interval = 3
        poll_timeout = 300
        privileged = true
        cpu_request = "100m"
        cpu_limit = "1"
        memory_request = "128Mi"
        memory_limit = "2Gi"
        helper_cpu_request = "50m"
        helper_memory_request = "64Mi"
        helper_cpu_limit = "200m"
        helper_memory_limit = "256Mi"

resources:
  limits:
    memory: 256Mi
    cpu: 200m
  requests:
    memory: 128Mi
    cpu: 100m
